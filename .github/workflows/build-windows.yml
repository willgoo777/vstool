name: Build Windows .exe

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:    # 手动触发

permissions:
  contents: write       # 打 tag 时需要写 release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Run tests (non-COM 部分)
        run: pytest -q
        # COM 相关测试在 macOS 上验证；windows-latest 上没装 Office，
        # word_diff / excel_legacy 走 skip 路径，仍能跑

      - name: Build .exe (PyInstaller)
        run: |
          pyinstaller `
            --onefile `
            --noconsole `
            --name vstool `
            --paths src `
            --hidden-import win32com `
            --hidden-import win32com.client `
            --hidden-import pythoncom `
            --collect-submodules openpyxl `
            --collect-submodules PySide6 `
            --exclude-module tkinter `
            --exclude-module PyQt5 `
            main.py

      - name: Show output size
        run: |
          Get-ChildItem dist | Format-Table Name, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vstool-windows-${{ github.sha }}
          path: dist/vstool.exe
          if-no-files-found: error

      - name: Attach to Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/vstool.exe
          generate_release_notes: true
