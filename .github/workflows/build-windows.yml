name: Build Windows .exe

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write       # 打 tag 时需要写 release

jobs:
  # ============ Nuitka（慢、AV 误报率极低，Uniaccess 推荐） ============
  nuitka:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install "nuitka>=2.4" "ordered-set" "zstandard"

      - name: Run tests
        run: pytest -q

      - name: Build standalone (folder, no extract at runtime)
        run: |
          python -m nuitka `
            --standalone `
            --enable-plugin=pyside6 `
            --include-package=PySide6 `
            --include-package=shiboken6 `
            --include-package=vstool `
            --include-package=openpyxl `
            --include-package=win32com `
            --include-package=win32com.client `
            --include-package=pythoncom `
            --include-package=pywintypes `
            --windows-console-mode=disable `
            --assume-yes-for-downloads `
            --remove-output `
            --company-name=vstool `
            --product-name=vstool `
            --file-version=2.0.0.0 `
            --product-version=2.0.0.0 `
            --file-description="文件夹对比工具" `
            --output-dir=dist `
            --output-filename=vstool.exe `
            main.py

      - name: Rename + zip standalone
        run: |
          Move-Item dist/main.dist dist/vstool
          Compress-Archive -Path dist/vstool -DestinationPath dist/vstool.zip
          Get-ChildItem dist | Format-Table Name, Length

      - name: Build onefile (single exe, extracts at runtime but native payload)
        run: |
          python -m nuitka `
            --standalone `
            --onefile `
            --enable-plugin=pyside6 `
            --include-package=PySide6 `
            --include-package=shiboken6 `
            --include-package=vstool `
            --include-package=openpyxl `
            --include-package=win32com `
            --include-package=win32com.client `
            --include-package=pythoncom `
            --include-package=pywintypes `
            --windows-console-mode=disable `
            --assume-yes-for-downloads `
            --remove-output `
            --company-name=vstool `
            --product-name=vstool `
            --file-version=2.0.0.0 `
            --product-version=2.0.0.0 `
            --file-description="文件夹对比工具" `
            --output-dir=dist `
            --output-filename=vstool-onefile.exe `
            main.py

      - name: Show output sizes
        run: Get-ChildItem dist | Format-Table Name, Length

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vstool-nuitka-${{ github.sha }}
          path: |
            dist/vstool-onefile.exe
            dist/vstool.zip
          if-no-files-found: error

      - name: Attach to Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/vstool-onefile.exe
            dist/vstool.zip
          generate_release_notes: true
