name: Build Windows .exe

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write       # 打 tag 时需要写 release

jobs:
  # ============ PyInstaller（快、被某些 EDR 误报） ============
  pyinstaller:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Run tests
        run: pytest -q

      - name: Build .exe (PyInstaller --onefile)
        run: |
          pyinstaller `
            --onefile `
            --noconsole `
            --name vstool `
            --paths src `
            --hidden-import win32com `
            --hidden-import win32com.client `
            --hidden-import pythoncom `
            --collect-submodules openpyxl `
            --collect-submodules PySide6 `
            --exclude-module tkinter `
            --exclude-module PyQt5 `
            main.py

      - name: Show output size
        run: Get-ChildItem dist | Format-Table Name, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vstool-pyinstaller-${{ github.sha }}
          path: dist/vstool.exe
          if-no-files-found: error

      - name: Rename for release
        if: startsWith(github.ref, 'refs/tags/v')
        run: Move-Item dist/vstool.exe dist/vstool-pyinstaller.exe

      - name: Attach to Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/vstool-pyinstaller.exe
          generate_release_notes: true

  # ============ Nuitka（慢、AV 误报率极低，Uniaccess 推荐） ============
  nuitka:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "nuitka>=2.4" "ordered-set" "zstandard"

      - name: Build standalone (folder, no extract at runtime)
        run: |
          python -m nuitka `
            --standalone `
            --enable-plugin=pyside6 `
            --include-package=openpyxl `
            --include-package=win32com `
            --include-package=win32com.client `
            --include-package=pythoncom `
            --include-package=pywintypes `
            --windows-console-mode=disable `
            --assume-yes-for-downloads `
            --remove-output `
            --company-name=vstool `
            --product-name=vstool `
            --file-version=0.2.0.0 `
            --product-version=0.2.0.0 `
            --file-description="文件夹对比工具" `
            --output-dir=dist `
            --output-filename=vstool.exe `
            main.py

      - name: Rename + zip standalone
        run: |
          Move-Item dist/main.dist dist/vstool-standalone
          Compress-Archive -Path dist/vstool-standalone -DestinationPath dist/vstool-nuitka-standalone.zip
          Get-ChildItem dist | Format-Table Name, Length

      - name: Build onefile (single exe, extracts at runtime but native payload)
        run: |
          python -m nuitka `
            --standalone `
            --onefile `
            --enable-plugin=pyside6 `
            --include-package=openpyxl `
            --include-package=win32com `
            --include-package=win32com.client `
            --include-package=pythoncom `
            --include-package=pywintypes `
            --windows-console-mode=disable `
            --assume-yes-for-downloads `
            --remove-output `
            --company-name=vstool `
            --product-name=vstool `
            --file-version=0.2.0.0 `
            --product-version=0.2.0.0 `
            --file-description="文件夹对比工具" `
            --output-dir=dist `
            --output-filename=vstool-nuitka.exe `
            main.py

      - name: Show output sizes
        run: Get-ChildItem dist | Format-Table Name, Length

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vstool-nuitka-${{ github.sha }}
          path: |
            dist/vstool-nuitka.exe
            dist/vstool-nuitka-standalone.zip
          if-no-files-found: error

      - name: Attach to Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/vstool-nuitka.exe
            dist/vstool-nuitka-standalone.zip
          generate_release_notes: true
